name: Comment on PR

on:
  pull_request:
    branches:
      - dev
      - main
    types: [opened, synchronize]

jobs:
  trigger-bot-review:
    name: Trigger Bot Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ secrets.BOT_REVIEW_COMMENT_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - name: Add comment on PR creation on main
        if: github.base_ref == 'main'
        uses: actions/github-script@v7
        continue-on-error: true
        timeout-minutes: 5
        with:
          github-token: ${{ env.GITHUB_TOKEN }}
          script: |
            const comments = ['/agentic_describe'];
            for (const comment of comments) {
            github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
            });
            }

      - name: Add comment on PR creation to trigger bot review
        if: github.event.action == 'opened' && github.base_ref == 'dev'
        uses: actions/github-script@v7
        continue-on-error: true
        timeout-minutes: 5
        with:
          github-token: ${{ env.GITHUB_TOKEN }}
          script: |
            const comments = ['/agentic_describe', '/agentic_review'];
            for (const comment of comments) {
            github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
            });
            }

      - name: Add comment on PR update
        if: github.event.action == 'synchronize' && github.base_ref == 'dev'
        uses: actions/github-script@v7
        continue-on-error: true
        timeout-minutes: 5
        with:
          github-token: ${{ env.GITHUB_TOKEN }}
          script: |
            const comments = ['/agentic_review'];
            for (const comment of comments) {
            github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
            });
            }
